<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#ffffff"/>
  <rect x="60" y="60" width="1080" height="510" fill="#ffffff" stroke="#e5e5e5" stroke-width="1"/>

  <!-- Top eyebrow -->
  <text x="100" y="140" font-family="ui-monospace, 'IBM Plex Mono', monospace" font-size="22" font-weight="600" letter-spacing="6" fill="#737373">WEB DESIGN PARTS</text>

  <!-- Main title -->
  <text x="100" y="270" font-family="ui-sans-serif, 'IBM Plex Sans', system-ui, sans-serif" font-size="92" font-weight="700" letter-spacing="-2" fill="#0a0a0a">Reference</text>
  <text x="100" y="370" font-family="ui-sans-serif, 'IBM Plex Sans', system-ui, sans-serif" font-size="92" font-weight="700" letter-spacing="-2" fill="#0a0a0a">Catalog</text>

  <!-- Stat row -->
  <g transform="translate(100, 470)">
    <text font-family="ui-monospace, 'IBM Plex Mono', monospace" font-size="32" font-weight="600" fill="#0a0a0a">137</text>
    <text x="65" font-family="ui-sans-serif, 'IBM Plex Sans', system-ui, sans-serif" font-size="20" fill="#525252">parts</text>
    <text x="160" font-family="ui-sans-serif, 'IBM Plex Sans', system-ui, sans-serif" font-size="20" fill="#a3a3a3">·</text>
    <text x="190" font-family="ui-monospace, 'IBM Plex Mono', monospace" font-size="32" font-weight="600" fill="#0a0a0a">11</text>
    <text x="240" font-family="ui-sans-serif, 'IBM Plex Sans', system-ui, sans-serif" font-size="20" fill="#525252">categories</text>
    <text x="395" font-family="ui-sans-serif, 'IBM Plex Sans', system-ui, sans-serif" font-size="20" fill="#a3a3a3">·</text>
    <text x="425" font-family="ui-monospace, 'IBM Plex Mono', monospace" font-size="32" font-weight="600" fill="#0a0a0a">9</text>
    <text x="455" font-family="ui-sans-serif, 'IBM Plex Sans', system-ui, sans-serif" font-size="20" fill="#525252">tags</text>
  </g>

  <!-- Tag chips at bottom -->
  <g transform="translate(100, 510)" font-family="ui-monospace, 'IBM Plex Mono', monospace" font-size="14" fill="#525252">
    <text>#ランディング  #ECサイト  #管理画面  #SaaS  #ブログ  #ポートフォリオ  #コーポレート</text>
  </g>

  <!-- Right side prefix tag, signature element -->
  <g transform="translate(1000, 100)">
    <rect x="0" y="0" width="120" height="44" fill="#0a0a0a" rx="3"/>
    <text x="60" y="29" text-anchor="middle" font-family="ui-monospace, 'IBM Plex Mono', monospace" font-size="14" font-weight="700" letter-spacing="2" fill="#ffffff">[LAY]</text>
  </g>
