<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="WEBデザインパーツの名称・用途・コード例リファレンス。全137パーツ・11カテゴリ・9タグで分類。サイトタイプ別・カテゴリ別・キーワードで横断検索。">
  <title>WEB Design Parts Reference</title>

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="favicon.svg">

  <!-- Open Graph / Twitter Card -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="WEB Design Parts — Reference Catalog">
  <meta property="og:description" content="WEBデザインパーツの名称・用途・コード例リファレンス。137パーツ・11カテゴリ・9タグで分類。">
  <meta property="og:image" content="images/og.svg">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:locale" content="ja_JP">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="WEB Design Parts — Reference Catalog">
  <meta name="twitter:description" content="WEBデザインパーツの名称・用途・コード例リファレンス。137パーツ収録。">
  <meta name="twitter:image" content="images/og.svg">

  <!-- Self-hosted fonts: preload critical weights for faster first paint -->
  <link rel="preload" href="fonts/plex-sans-var.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="fonts/plex-mono-400.woff2" as="font" type="font/woff2" crossorigin>

  <!-- Critical CSS inlined (eliminates render-blocking) -->
  <style>
    /* @font-face: paths relative to index.html */
    @font-face {
      font-family: 'IBM Plex Sans';
      font-style: normal;
      font-weight: 400 700;
      font-display: swap;
      src: url('fonts/plex-sans-var.woff2') format('woff2');
      unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
    }
    /* Fallback with metric override — eliminates CLS during font swap */
    @font-face {
      font-family: 'IBM Plex Sans Fallback';
      src: local('Arial'), local('Helvetica');
      size-adjust: 105%;
      ascent-override: 95%;
      descent-override: 24%;
      line-gap-override: 0%;
    }
    @font-face {
      font-family: 'IBM Plex Mono Fallback';
      src: local('Consolas'), local('Menlo'), local('Courier New');
      size-adjust: 100%;
      ascent-override: 90%;
      descent-override: 22%;
      line-gap-override: 0%;
    }
    @font-face {
      font-family: 'IBM Plex Mono';
      font-style: normal;
      font-weight: 400;
      font-display: swap;
      src: url('fonts/plex-mono-400.woff2') format('woff2');
      unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
    }
    @font-face {
      font-family: 'IBM Plex Mono';
      font-style: normal;
      font-weight: 500;
      font-display: swap;
      src: url('fonts/plex-mono-500.woff2') format('woff2');
      unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
    }
    @font-face {
      font-family: 'IBM Plex Mono';
      font-style: normal;
      font-weight: 600;
      font-display: swap;
      src: url('fonts/plex-mono-600.woff2') format('woff2');
      unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
    }
    :root {
      --color-bg: #ffffff;
      --color-surface: #ffffff;
      --color-surface-2: #fafafa;
      --color-surface-3: #f4f4f5;
      --color-text: #0a0a0a;
      --color-text-secondary: #525252;
      --color-text-muted: #737373;
      --color-text-faint: #a3a3a3;
      --border: #e5e5e5;
      --border-strong: #d4d4d4;
      --color-inverse-bg: #0a0a0a;
      --color-inverse-text: #ffffff;
      --color-inverse-text-muted: rgba(255, 255, 255, 0.6);
      --font-body: 'IBM Plex Sans', 'IBM Plex Sans Fallback', 'Hiragino Sans', 'Yu Gothic', 'Noto Sans JP', sans-serif;
      --font-mono: 'IBM Plex Mono', 'IBM Plex Mono Fallback', 'SF Mono', 'Consolas', 'Liberation Mono', monospace;
      --layout-max-width: 1400px;
      --sidebar-width: 220px;
      --radius-sm: 4px;
      --radius-md: 6px;
      --space-1: 4px; --space-2: 8px; --space-3: 12px; --space-4: 16px;
      --space-5: 20px; --space-6: 24px; --space-8: 32px;
      --space-10: 40px; --space-16: 64px;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { font-size: 16px; -webkit-text-size-adjust: 100%; }
    body {
      font-family: var(--font-body);
      background: var(--color-bg);
      color: var(--color-text);
      line-height: 1.6;
      min-height: 100vh;
      font-feature-settings: "palt" 1, "kern" 1;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    a { color: var(--color-text); text-decoration: underline; text-decoration-thickness: 1px; text-underline-offset: 2px; }
    button { font-family: var(--font-body); cursor: pointer; border: none; background: none; color: inherit; }
    input { font-family: var(--font-body); outline: none; border: none; }
    ul, ol { list-style: none; }
    img { max-width: 100%; display: block; }
    .skip-link { position: absolute; top: -100px; left: 8px; z-index: 1000; padding: 10px 16px; background: var(--color-text); color: var(--color-inverse-text); font-size: 12px; font-weight: 500; text-decoration: none; border-radius: var(--radius-sm); transition: top 0.15s; }
    .skip-link:focus { top: 8px; }
    .visually-hidden { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0; }
    :focus { outline: none; }
    :focus-visible { outline: 2px solid var(--color-text); outline-offset: 2px; border-radius: var(--radius-sm); }
    #main-content:focus { outline: none; }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; scroll-behavior: auto !important; }
    }
  </style>
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/sections.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

  <!-- ===== SKIP LINK ===== -->
  <a href="#main-content" class="skip-link">メインコンテンツへスキップ</a>

  <!-- ===== HEADER ===== -->
  <header class="site-header">
    <div class="site-header__inner">
      <h1 class="site-title">WEB Design Parts</h1>
      <p class="site-subtitle">デザインパーツの名称・用途・コード例リファレンス</p>
      <span class="site-count" id="totalCount"></span>
    </div>
  </header>

  <!-- ===== LAYOUT (Sidebar + Main) ===== -->
  <div class="layout">

    <!-- Sidebar -->
    <aside class="sidebar" aria-label="カテゴリナビゲーション">
      <ul class="sidebar__list" id="sidebarNav" aria-label="カテゴリ">
        <!-- JS で生成 -->
      </ul>
    </aside>

    <!-- Main column -->
    <div class="layout__main">

      <!-- Search -->
      <div class="search-wrapper">
        <div class="search-bar">
          <span class="search-bar__icon" aria-hidden="true">⌕</span>
          <label for="searchInput" class="visually-hidden">パーツを検索</label>
          <input
            type="text"
            id="searchInput"
            class="search-input"
            placeholder="パーツ名・用途で検索…"
          >
          <button type="button" class="search-clear" id="searchClear" aria-label="検索をクリア">×</button>
        </div>
      </div>

      <!-- Tag filter (use case based) -->
      <nav class="tag-filter-wrapper" aria-label="サイトタイプでフィルター">
        <div class="tag-filter" id="tagFilter" role="group" aria-label="タグ">
          <!-- JS で生成 -->
        </div>
        <button type="button" class="tag-clear" id="tagClear" aria-label="タグ選択をすべて解除">× クリア</button>
      </nav>

      <!-- Controls -->
      <div class="controls-wrapper">
        <span class="results-count" id="resultsCount" aria-live="polite"></span>
        <div class="controls-actions">
          <button type="button" class="control-btn" id="expandAll">すべて開く</button>
          <span class="control-divider" aria-hidden="true">·</span>
          <button type="button" class="control-btn" id="collapseAll">すべて閉じる</button>
        </div>
      </div>

      <!-- Parts -->
      <main class="parts-container" id="main-content" tabindex="-1">
        <div id="partsContainer">
          <!-- JS で生成 -->
        </div>
      </main>

    </div>
  </div>

  <!-- ===== KEYBOARD SHORTCUT HELP MODAL ===== -->
  <div class="shortcut-modal" id="shortcutModal" hidden>
    <div class="shortcut-modal__backdrop" data-shortcut-close></div>
    <div class="shortcut-modal__content" role="dialog" aria-modal="true" aria-labelledby="shortcutModalTitle">
      <h2 class="shortcut-modal__title" id="shortcutModalTitle">キーボードショートカット</h2>
      <dl class="shortcut-list">
        <dt><kbd>/</kbd></dt><dd>検索バーにフォーカス</dd>
        <dt><kbd>Esc</kbd></dt><dd>検索クリア / モーダル閉じる</dd>
        <dt><kbd>Shift</kbd> + <kbd>E</kbd></dt><dd>すべて開く</dd>
        <dt><kbd>Shift</kbd> + <kbd>C</kbd></dt><dd>すべて閉じる</dd>
        <dt><kbd>?</kbd></dt><dd>このヘルプを表示</dd>
      </dl>
      <button type="button" class="shortcut-modal__close" data-shortcut-close>閉じる</button>
    </div>
  </div>

  <!-- ===== FOOTER ===== -->
  <footer class="site-footer">
    <div class="site-footer__inner">
      <span id="footerText"></span>
    </div>
  </footer>

  <!-- ===== SCRIPTS ===== -->
  <script src="js/data.js"></script>
  <script src="js/components.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
